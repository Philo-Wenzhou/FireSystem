    <text x="485" y="622" text-anchor="middle" fill="#D9F4FF" font-size="22" font-family="Segoe UI, Arial, sans-serif">Heatmap View</text>
    <rect x="586" y="594" width="180" height="44" rx="22" fill="#16333D" stroke="#3C5A64"/>
    <text x="676" y="622" text-anchor="middle" fill="#D9F4FF" font-size="22" font-family="Segoe UI, Arial, sans-serif">Corridor View</text>
    <rect x="782" y="594" width="160" height="44" rx="22" fill="#16333D" stroke="#3C5A64"/>
    <text x="862" y="622" text-anchor="middle" fill="#D9F4FF" font-size="22" font-family="Segoe UI, Arial, sans-serif">Terrain View</text>
    <rect x="958" y="594" width="200" height="44" rx="22" fill="#16333D" stroke="#3C5A64"/>
    <text x="1058" y="622" text-anchor="middle" fill="#D9F4FF" font-size="22" font-family="Segoe UI, Arial, sans-serif">No Real Line Data</text>
  </g>

  <g>
