    <rect x="1084" y="269" width="84" height="18" rx="9" fill="#5FD2B0" fill-opacity="0.9"/>
    <rect x="1084" y="301" width="58" height="14" rx="7" fill="#86E2C9" fill-opacity="0.75"/>
    <path d="M1086 350C1116 326 1147 322 1180 342" stroke="#FF9C4A" stroke-width="10" stroke-linecap="round"/>
    <circle cx="1148" cy="340" r="8" fill="#FFD15C"/>

    <rect x="1210" y="245" width="132" height="132" rx="26" fill="#0F222B" stroke="#395461"/>
    <rect x="1234" y="269" width="84" height="18" rx="9" fill="#7CA7FF" fill-opacity="0.9"/>
    <rect x="1234" y="301" width="58" height="14" rx="7" fill="#A6BFFF" fill-opacity="0.75"/>
    <path d="M1234 354H1318" stroke="#FF6A4D" stroke-width="10" stroke-linecap="round"/>
    <path d="M1244 336L1270 320L1296 332L1310 314" stroke="#FFD464" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

