    <text x="1090" y="438" fill="#D6E6EE" font-size="22" font-family="Segoe UI, Arial, sans-serif">Warning Snapshot</text>
    <text x="1090" y="482" fill="#FFB055" font-size="40" font-weight="700" font-family="Segoe UI, Arial, sans-serif">High Activity</text>
    <text x="1090" y="526" fill="#D1DEE5" font-size="22" font-family="Segoe UI, Arial, sans-serif">Synthetic corridor surge</text>
    <text x="1090" y="556" fill="#D1DEE5" font-size="22" font-family="Segoe UI, Arial, sans-serif">Time playback enabled</text>
